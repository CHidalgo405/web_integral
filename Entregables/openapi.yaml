  /purchases:
    get:
      tags: [Purchases]
      summary: Lista ventas
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: employee_id, in: query, schema: { type: string, format: uuid } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Purchase' } } } } }
    post:
      tags: [Purchases]
      summary: Crea venta con ítems en transacción
      description: Si status=completed el trigger descuenta stock automáticamente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_id, delivery_method, payment_method, items]
              properties:
                customer_id:      { type: string, format: uuid }
                employee_id:      { type: string, format: uuid }
                delivery_zone_id: { type: string, format: uuid }
                delivery_method:  { type: string, enum: [pickup, delivery] }
                payment_method:   { type: string, enum: [cash, card, transfer, mixed] }
                status:           { type: string, enum: [pending, completed] }
                cash_tendered:    { type: number }
                items:
                  type: array
                  items:
                    type: object
                    required: [inventory_id, quantity, unit_price]
                    properties:
                      inventory_id: { type: string, format: uuid }
                      promotion_id: { type: string, format: uuid }
                      quantity:     { type: integer }
                      unit_price:   { type: number }
                      discount_pct: { type: number }
      responses:
        "201": { description: Created }
        "409": { description: Insufficient stock }

  /purchases/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Purchases]
      summary: Venta con ítems y devoluciones
      responses:
        "200": { description: OK }
    put:
      tags: [Purchases]
      summary: Actualiza estado (pending→completed dispara deducción de stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [pending, completed, cancelled] }
      responses:
        "200": { description: OK }
        "409": { description: Insufficient stock }

  /purchase-returns:
    get:
