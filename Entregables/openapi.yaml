      summary: Lista devoluciones
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/PurchaseReturn' } } } } }
    post:
      tags: [Purchase Returns]
      summary: Registra devolución con ítems en transacción
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [purchase_id, employee_id, refund_method, items]
              properties:
                purchase_id:   { type: string, format: uuid }
                employee_id:   { type: string, format: uuid }
                refund_method: { type: string, enum: [cash, card] }
                reason:        { type: string }
                items:
                  type: array
                  items:
                    type: object
                    required: [purchase_item_id, inventory_id, quantity, unit_price]
                    properties:
                      purchase_item_id: { type: string, format: uuid }
                      inventory_id:     { type: string, format: uuid }
                      quantity:         { type: integer }
                      unit_price:       { type: number }
                      restock:          { type: boolean }
      responses:
        "201": { description: Created }

