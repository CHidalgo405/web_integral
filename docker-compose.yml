services:
  frontend:
    build: ./mi cliente (la familia)/Arquitectura/FrontEnd
    ports:
      - "4200:4200"
    volumes:
      - ./mi cliente (la familia)/Arquitectura/FrontEnd:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - NODE_ENV=development

  backend:
    build: ./mi cliente (la familia)/Arquitectura/Backend
    ports:
      - "3000:3000"
    volumes:
      - ./mi cliente (la familia)/Arquitectura/Backend:/app
      - /app/node_modules
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-yourpassword}@database:5432/${POSTGRES_DB:-tiendita_maday}
      - PORT=3000

  database:
    image: postgres:latest
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-yourpassword}
      - POSTGRES_DB=${POSTGRES_DB:-tiendita_maday}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./mi cliente (la familia)/Arquitectura/Database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
