<div class="picker-head"><div><strong>Ubicación exacta</strong><span>Coloca el pin en la entrada del domicilio.</span></div><button type="button" (click)="locate()" [disabled]="locating()"><app-icon name="map-pin" size="14"/> {{locating()?'Ubicando…':'Usar mi ubicación'}}</button></div><div [id]="'address-location-'+instanceId()" class="picker-map"></div>@if(quote()){<div class="picker-status" [class.outside]="!quote()!.eligible"><app-icon [name]="quote()!.eligible?'check':'alert-triangle'" size="15" color="currentColor"/><span>{{quote()!.eligible?'Dentro de cobertura · '+quote()!.distance_km+' km · '+(quote()!.fee|currency:'MXN'):'Fuera del área de entrega · '+quote()!.distance_km+' km'}}</span></div>}@if(error()){<div class="picker-error">{{error()}}</div>}
