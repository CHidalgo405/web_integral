<app-header title="Método de Envío" [showBack]="true"></app-header><div class="checkout-page" id="checkout-shipping-page"><div class="step-indicator"><span class="step done">✓</span><span class="step done">✓</span><span class="step active">3</span><span class="step">4</span></div><div class="options-list" role="radiogroup">@for(opt of shippingOptions;track opt.key){<div class="option-card" role="radio" [attr.aria-checked]="selected()===opt.key" tabindex="0" [class.selected]="selected()===opt.key" [class.disabled]="loadingQuote()" (click)="select(opt.key)" (keydown.enter)="select(opt.key)"><span class="opt-icon"><app-icon [name]="opt.icon" size="24"/></span><div class="opt-info"><h3>{{opt.label}}</h3><p>{{opt.description}}</p></div><span class="opt-price">{{price(opt.key)}}</span></div>}</div>@if(deliveryError()){<p class="shipping-error">{{deliveryError()}}</p>}<button class="btn-continue" [disabled]="!selected()||loadingQuote()" (click)="next()" id="shipping-next-btn">Continuar</button></div>
